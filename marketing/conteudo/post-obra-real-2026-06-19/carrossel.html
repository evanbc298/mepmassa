<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; }

.slide {
  width: 1080px;
  height: 1350px;
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  font-family: 'Inter', sans-serif;
}

/* Foto de fundo */
.slide-bg {
  position: absolute;
  inset: 0;
  background-image: url('file:///c:/Users/evanb/Desktop/MEPMASSA/MazyOS/imagens e videos/WhatsApp Image 2026-06-18 at 21.15.55.jpeg');
  background-size: cover;
  background-position: center 30%;
  z-index: 0;
}

/* Gradient overlay — transparente no centro, dark nas bordas */
.slide-overlay {
  position: absolute;
  inset: 0;
  background:
    linear-gradient(to bottom,
      rgba(7,16,30,0.72) 0%,
      rgba(7,16,30,0.15) 28%,
      rgba(7,16,30,0.05) 45%,
      rgba(7,16,30,0.35) 65%,
      rgba(7,16,30,0.88) 85%,
      rgba(7,16,30,0.97) 100%
    );
  z-index: 1;
}

/* Conteúdo */
.slide-content {
  position: relative;
  z-index: 2;
  display: flex;
  flex-direction: column;
  height: 100%;
  padding: 64px 72px;
}

/* Header */
.slide-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.logo-wrap img {
  height: 48px;
  filter: brightness(0) invert(1);
}

.handle {
  font-size: 16px;
  font-weight: 600;
  color: rgba(255,255,255,0.7);
  letter-spacing: 0.04em;
}

/* Spacer */
.spacer { flex: 1; }

/* Bottom content */
.slide-bottom {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.kicker {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  font-size: 13px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.28em;
  color: #F28C28;
}

.kicker::before {
  content: '';
  display: block;
  width: 36px;
  height: 3px;
  background: #F28C28;
  border-radius: 2px;
}

.titulo {
  font-size: 96px;
  font-weight: 900;
  color: #fff;
  line-height: 0.96;
  letter-spacing: -0.04em;
}

.subtitulo {
  font-size: 22px;
  font-weight: 500;
  color: rgba(255,255,255,0.72);
  line-height: 1.55;
  max-width: 640px;
}

/* Linha divisória */
.divider {
  width: 100%;
  height: 1px;
  background: rgba(255,255,255,0.12);
  margin: 4px 0;
}

/* Footer */
.slide-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-top: 8px;
}

.footer-tag {
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.22em;
  color: rgba(255,255,255,0.35);
}

.footer-pill {
  background: #F28C28;
  color: #fff;
  font-size: 11px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.18em;
  padding: 6px 16px;
  border-radius: 20px;
}
</style>
</head>
<body>

<div class="slide" id="slide-01">
  <div class="slide-bg"></div>
  <div class="slide-overlay"></div>
  <div class="slide-content">

    <div class="slide-header">
      <div class="logo-wrap">
        <img src="file:///c:/Users/evanb/Desktop/MEPMASSA/MazyOS/saidas/logo-mep.svg" alt="MEP">
      </div>
      <div class="handle">@mep.industria</div>
    </div>

    <div class="spacer"></div>

    <div class="slide-bottom">
      <div class="kicker">Obra real · Sem encenação</div>
      <div class="titulo">É assim<br>na prática.</div>
      <div class="subtitulo">Pronto para uso, direto da embalagem para a parede. Sem betoneira, sem mistura.</div>
      <div class="divider"></div>
      <div class="slide-footer">
        <div class="footer-tag">Massa MEP · mep.ind.br</div>
        <div class="footer-pill">4x Mais Rápida</div>
      </div>
    </div>

  </div>
</div>

</body>
</html>
