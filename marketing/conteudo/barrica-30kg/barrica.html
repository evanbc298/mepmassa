<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:transparent; width:520px; height:640px; display:flex; align-items:center; justify-content:center; }

  .barrel { width:420px; height:600px; position:relative; }

  /* Sombra */
  .barrel::after {
    content:'';
    position:absolute;
    bottom:-18px; left:30px; right:30px;
    height:24px;
    background:radial-gradient(ellipse, rgba(0,0,0,0.28) 0%, transparent 70%);
    border-radius:50%;
  }

  /* Corpo branco */
  .body {
    position:absolute;
    bottom:0; left:0; right:0;
    height:560px;
    background: linear-gradient(to right,
      #b0b0b0 0%,
      #d8d8d8 5%,
      #f2f2f2 14%,
      #fefefe 32%,
      #ffffff 50%,
      #f8f8f8 68%,
      #e8e8e8 82%,
      #cccccc 92%,
      #aaaaaa 100%
    );
    border-radius: 16px 16px 20px 20px;
    overflow: hidden;
  }

  /* Aro inferior */
  .aro {
    position:absolute;
    bottom:0; left:0; right:0;
    height:20px;
    background: linear-gradient(to right, #999 0%, #e0e0e0 18%, #f5f5f5 45%, #ffffff 50%, #eeeeee 65%, #cccccc 85%, #888 100%);
    border-radius: 0 0 20px 20px;
  }

  /* Tampa */
  .lid {
    position:absolute;
    top:0; left:0; right:0;
    height:72px;
    z-index:10;
  }
  .lid-top {
    height:28px;
    background: linear-gradient(to right, #0d0d0d 0%, #2e2e2e 20%, #404040 45%, #383838 55%, #1e1e1e 80%, #080808 100%);
    border-radius: 16px 16px 0 0;
  }
  .lid-band {
    height:24px;
    background: linear-gradient(to right, #181818 0%, #3c3c3c 18%, #505050 45%, #484848 55%, #2a2a2a 80%, #101010 100%);
  }
  .lid-rim {
    height:20px;
    background: linear-gradient(to right, #888 0%, #cccccc 15%, #e5e5e5 35%, #f0f0f0 50%, #e0e0e0 65%, #c0c0c0 85%, #777 100%);
  }

  /* Label completa */
  .label {
    position:absolute;
    top:72px; left:14px; right:14px; bottom:20px;
    display:flex;
    flex-direction:column;
  }

  /* Header laranja */
  .label-header {
    background: linear-gradient(135deg, #d97010 0%, #f28c28 35%, #f9a545 52%, #f28c28 68%, #cc6a08 100%);
    padding:9px 16px;
    display:flex;
    align-items:center;
    gap:10px;
    height:54px;
    flex-shrink:0;
  }
  .label-header img {
    height:32px;
    filter:brightness(0) invert(1);
  }
  .label-header-text {
    font-family:'Arial Black', 'Arial Bold', Arial, sans-serif;
    font-size:18px;
    font-weight:900;
    color:#fff;
    letter-spacing:0.06em;
    text-shadow:0 1px 3px rgba(0,0,0,0.35);
  }

  /* Body navy */
  .label-body {
    background: linear-gradient(to right, #04101e 0%, #07101e 40%, #091828 100%);
    flex:1;
    padding:14px 16px 12px 16px;
    display:flex;
    flex-direction:column;
    gap:0;
  }

  .product-name {
    font-family:'Arial Black', 'Arial Bold', Arial, sans-serif;
    font-size:44px;
    font-weight:900;
    color:#ffffff;
    line-height:0.96;
    letter-spacing:-0.01em;
    text-transform:uppercase;
    margin-bottom:10px;
  }

  .badge {
    display:inline-block;
    background:linear-gradient(135deg, #d97010, #f28c28);
    color:#fff;
    font-family:'Arial Black', Arial, sans-serif;
    font-size:12px;
    font-weight:900;
    padding:5px 13px;
    border-radius:4px;
    letter-spacing:0.06em;
    text-transform:uppercase;
    margin-bottom:16px;
    align-self:flex-start;
    flex-shrink:0;
  }

  /* Linha inferior: ícones à esquerda, peso à direita */
  .bottom-row {
    display:flex;
    align-items:flex-end;
    gap:0;
    margin-top:auto;
  }

  .icons-col {
    display:flex;
    flex-direction:column;
    gap:10px;
    flex:1;
  }

  .icon-item {
    display:flex;
    align-items:center;
    gap:8px;
  }
  .icon-circle {
    width:34px; height:34px;
    border-radius:50%;
    border:1.5px solid rgba(255,255,255,0.22);
    display:flex;
    align-items:center;
    justify-content:center;
    flex-shrink:0;
  }
  .icon-circle svg { width:16px; height:16px; }
  .icon-label {
    font-family:Arial, sans-serif;
    font-size:10px;
    color:rgba(255,255,255,0.65);
    line-height:1.3;
    font-weight:600;
  }

  /* Box de peso */
  .weight-box {
    border:2px solid rgba(255,255,255,0.2);
    border-radius:6px;
    padding:10px 14px;
    text-align:center;
    background:rgba(255,255,255,0.06);
    flex-shrink:0;
  }
  .weight-kg {
    font-family:'Arial Black', Arial, sans-serif;
    font-size:32px;
    font-weight:900;
    color:#fff;
    line-height:1;
    white-space:nowrap;
  }
  .weight-unit {
    font-family:Arial, sans-serif;
    font-size:9px;
    color:rgba(255,255,255,0.65);
    font-weight:700;
    letter-spacing:0.04em;
    text-transform:uppercase;
    margin-top:4px;
    line-height:1.35;
  }
</style>
</head>
<body>
<div class="barrel" id="barrica">
  <div class="lid">
    <div class="lid-top"></div>
    <div class="lid-band"></div>
    <div class="lid-rim"></div>
  </div>
  <div class="body">
    <div class="aro"></div>
    <div class="label">
      <div class="label-header">
        <img src="file:///c:/Users/evanb/Desktop/MEPMASSA/MazyOS/saidas/logo-mep.svg" alt="MEP">
        <div class="label-header-text">MEP MASSAS</div>
      </div>
      <div class="label-body">
        <div class="product-name">MASSA<br>PARA<br>EDIFI&shy;CAÇÃO</div>
        <div class="badge">4x MAIS RÁPIDA</div>
        <div class="bottom-row">
          <div class="icons-col">
            <div class="icon-item">
              <div class="icon-circle">
                <svg viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.75)" stroke-width="2">
                  <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
                </svg>
              </div>
              <div class="icon-label">Pega em<br>30 min</div>
            </div>
            <div class="icon-item">
              <div class="icon-circle">
                <svg viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.75)" stroke-width="2">
                  <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
                </svg>
              </div>
              <div class="icon-label">Sem mistura<br>sem betoneira</div>
            </div>
            <div class="icon-item">
              <div class="icon-circle">
                <svg viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.75)" stroke-width="2">
                  <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/>
                </svg>
              </div>
              <div class="icon-label">40% mais<br>econômica</div>
            </div>
          </div>
          <div class="weight-box">
            <div class="weight-kg">30 KG</div>
            <div class="weight-unit">Argamassa<br>Polimérica</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
