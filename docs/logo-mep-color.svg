    x="90" y="55"
    font-family="'Barlow Condensed', 'Arial Black', Impact, Arial, sans-serif"
    font-weight="900"
    font-size="33"
    fill="#F28C28"
    letter-spacing="-0.5">COLOR</text>

  <!-- TINTAS — micro, muted -->
  <text
    x="92" y="70"
