    x="92" y="26"
    font-family="'Barlow Condensed', 'Arial Black', Impact, Arial, sans-serif"
    font-weight="900"
    font-size="13"
    fill="#FFFFFF"
    fill-opacity="0.75"
    letter-spacing="6">MEP</text>

  <!-- COLOR — grande, laranja -->
