<!-- ======================================================
     OTIMIZAÇÃO DE IMAGENS — substituir todas as <img> por
     estas versões otimizadas.
     
     Regras:
     1. Converter PNGs pesados para WebP (manter PNG como fallback)
     2. SEMPRE adicionar width e height (evita CLS)
     3. SEMPRE adicionar loading="lazy" (exceto na LCP)
     4. SEMPRE adicionar decoding="async"
     5. IMAGEM LCP recebe fetchpriority="high" e loading="eager"
     6. ALT descritivo (keyword quando natural, sem stuffing)
     ====================================================== -->

<!-- ❌ ANTES (problema: 1MB+, sem dimensões, sem lazy) -->
<img src="balde-25kg-v2.png.png" alt="Massa MEP — Balde 25kg">

<!-- ✅ DEPOIS (WebP + dimensões + lazy + async + alt descritivo) -->
<picture>
  <source srcset="balde-25kg-v2.webp" type="image/webp">
  <source srcset="balde-25kg-v2.png" type="image/png">
  <img src="balde-25kg-v2.png"
       alt="Balde de 25kg de argamassa polimérica MEP Massas — pronta para uso"
       width="500"
       height="500"
       loading="eager"
       fetchpriority="high"
       decoding="async">
</picture>

<!-- Logo (sempre eager, é marca) -->
<img src="logo-mep.svg"
     alt="MEP Indústria — argamassa polimérica e tintas"
     width="180"
     height="48"
     loading="eager"
     fetchpriority="high"
     decoding="async">

     COMANDOS PARA CONVERTER PNG → WEBP (rodar localmente)
     ====================================================== -->

cwebp -q 80 balde-25kg-v2.png.png -o balde-25kg-v2.webp
cwebp -q 80 barrica-25kg.png.png    -o barrica-25kg.webp

cwebp -q 80 bucket-esmalte.png      -o bucket-esmalte.webp

cwebp -q 80 bucket-economica.png    -o bucket-economica.webp

# Ou em lote (bash):
